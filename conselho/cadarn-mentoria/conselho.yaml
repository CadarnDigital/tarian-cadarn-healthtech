name: cadarn-mentoria
version: 1.0.0
description: Conselho de Mentoria Empresarial Cadarn — 10 mentores especializados que aconselham e orientam a tríade (Fabiano, Samira, Gui). Réplica do Conselho da Martech (_AIOX_Manager) — Healthtech é braço da própria Cadarn, não cliente, mesma tríade decisória.
author: Fabiano Cunha
license: UNLICENSED

aiox:
  minVersion: "2.1.0"
  type: conselho

# Natureza do Conselho
nature:
  description: |
    O Conselho de Mentoria NÃO é uma squad — não executa entregas para clientes.
    É uma camada de aconselhamento estratégico que orienta a tríade Cadarn
    (CEO, CRO, Especialista IA) em decisões de negócio, gestão e crescimento —
    incluindo decisões específicas do braço Healthtech.
  mode: "mentor + operador"
  interaction: "Mentores aconselham E podem operar (facilitar, gerar artefatos, conduzir rituais)"

# Quem é mentoreado
mentees:
  - name: Fabiano
    role: CEO
    focus: "Visão de produto, arquitetura, decisões estratégicas"
  - name: Samira
    role: CRO
    focus: "Comercial, relacionamento, go-to-market"
  - name: Gui
    role: Especialista IA
    focus: "Execução técnica, automações, infraestrutura IA"

# Hierarquia
hierarchy:
  decision_authority: "Fabiano (decisão final absoluta)"
  mentor_role: "Aconselhar, questionar, propor — nunca impor"

# 10 mentores
agents:
  - id: scrum-master
    name: Sensei
    role: Mentor Scrum / Gestão Ágil
    dna_source: "Jeff Sutherland (co-criador do Scrum)"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/sutherland/"
    agent_file: "conselho/cadarn-mentoria/agents/scrum-master.md"
    command: ".claude/commands/conselho/scrum-master.md"
    focus: "Scrum para times pequenos, rituais, Sprint, gestão ágil de agência — aplicado ao braço Healthtech"
    status: ativo

  - id: ofertas
    name: Mozi
    role: Mentor de Ofertas, Escala e Aquisição
    dna_source: "Alex Hormozi ($100M Offers, $100M Leads, $100M Money Models)"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/hormozi/"
    agent_file: "conselho/cadarn-mentoria/agents/ofertas.md"
    command: ".claude/commands/conselho/ofertas.md"
    focus: |
      Construir Grand Slam Offers, diagnosticar conversão, precificar high-ticket,
      estruturar stacks de valor, criar garantias, nomear ofertas (MAGIC), revisar
      copy com Value Equation, escalar aquisição (Core Four), Money Models.
    status: ativo

  - id: operacoes
    name: Forja
    role: Operações, Processos, Eficiência
    dna_source: "Leila Hormozi (Build with Leila, Acquisition.com)"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/leila-hormozi/"
    agent_file: "conselho/cadarn-mentoria/agents/operacoes.md"
    command: ".claude/commands/conselho/operacoes.md"
    focus: |
      Diagnosticar e escalar operações, construir sistemas replicáveis, SOPs eficazes,
      contratação, cultura de accountability, comunicação interna, gargalos operacionais.
      5 Frameworks: Five Star Service, Gametape Review, High Performance Communication,
      Monday Hour One, Pay Increase.
    status: ativo

  - id: personal-branding
    name: Koan
    role: Mentor de Personal Branding e One-Person Business
    dna_source: "Dan Koe (The Art of Focus, Purpose & Profit, Digital Economics)"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/dan-koe/"
    agent_file: "conselho/cadarn-mentoria/agents/personal-branding.md"
    command: ".claude/commands/conselho/personal-branding.md"
    focus: |
      Marca pessoal da tríade, posicionamento Anti-Niche, estratégia de conteúdo
      baseada em newsletter, ofertas digitais, diagnóstico de entropia organizacional,
      frameworks de Dan Koe (4 Pilares, Fill-Empty-Use, Deep Generalism, Value Creation).
      Inclui Protocolo de Conflito para adaptar filosofia solo ao contexto de 3 sócios.
    status: ativo

  - id: alta-performance
    name: Titânio
    role: Alta Performance, Mindset, Gestão de Energia
    dna_source: "Joel Jota (100% Presente, Jota Jota Podcast, 3Ps Treinamentos)"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/joel-jota/"
    agent_file: "conselho/cadarn-mentoria/agents/alta-performance.md"
    command: ".claude/commands/conselho/alta-performance.md"
    focus: |
      Diagnosticar e elevar performance da tríade: 6Rs (gestão de energia),
      5Ds (caminho para domínio), mini-hábitos, disciplina > motivação,
      equilíbrio saúde-família-trabalho, mentalidade de atleta aplicada a negócios.
    status: ativo

  - id: vendas-escala
    name: Inflexão
    role: Vendas em Escala, Liderança
    dna_source: "Flávio Augusto da Silva (Geração de Valor, Wise Up, VENDE-C, O Conselho, A Trinca)"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/flavio-augusto/"
    agent_file: "conselho/cadarn-mentoria/agents/vendas-escala.md"
    command: ".claude/commands/conselho/vendas-escala.md"
    focus: |
      Escalar operação comercial, estruturar venda ativa, montar e liderar time comercial,
      avaliar modelo de negócios (escala, margem, recorrência), técnica de indicação,
      diagnóstico comercial de clientes (corretoras, faturamento hospitalar, clínicas),
      precificação de alto valor, mentalidade empreendedora. Conexão com A Trinca
      (Caio Carneiro + Joel Jota).
    status: ativo

  - id: vendas-diretas
    name: Vínculo
    role: Vendas Diretas, Networking
    dna_source: "Caio Carneiro (VENDE-C, Seja Foda!, Enfodere-se!, A Trinca)"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/caio-carneiro/"
    agent_file: "conselho/cadarn-mentoria/agents/vendas-diretas.md"
    command: ".claude/commands/conselho/vendas-diretas.md"
    note: "Mentor dedicado do Conselho (sem duplo chapéu na Healthtech — o líder da Squad Cadarn Comercial local é o Caio, persona própria, DNA parcialmente sobreposto com Caio Carneiro mas identidade distinta)"
    focus: |
      Mentorar a tríade em vendas consultivas de alto ticket, prospecção,
      diagnóstico antes da proposta, tratamento de objeções, follow-up sistemático,
      networking estratégico e construção de relacionamentos comerciais duradouros.
    status: ativo

  - id: copywriting
    name: Verbo
    role: Marketing Digital BR, Copywriting
    dna_source: "Ícaro de Carvalho (O Novo Mercado, MAV, Permission Marketing)"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/icaro-carvalho/"
    agent_file: "conselho/cadarn-mentoria/agents/copywriting.md"
    command: ".claude/commands/conselho/copywriting.md"
    focus: |
      Copywriting persuasivo, estratégia de conteúdo, funis de venda, Permission Marketing,
      Soft Copy vs Hard Copy, MAV (funil perpétuo), storytelling como venda, ofertas para
      prestadores de serviços premium BR. Tom provocativo, irônico, definitivo.
    status: ativo

  - id: mylus
    name: Mylus
    role: Mentor de Engenharia de Valor — Rigor Analítico e Justificativa Financeira
    dna_source: "Marcos Mylius (Engenharia de Valor) — framework, não persona/voz"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/mylius/DNA-EXTRACT.md"
    agent_file: "squads/cadarn-comercial/agents/mylus.md"
    command: ".claude/commands/conselho/mylus.md"
    note: "Duplo chapéu — também Consultor Analítico de Vendas B2B Complexas da Squad Cadarn Comercial (mesmo nome nas duas funções, padrão Camy/Clarissa)"
    focus: |
      Orientar a tríade (Fabiano, Samira, Gui) em decisões internas que exigem
      justificar valor com rigor: precificação por valor em vez de custo,
      business case de investimento, mudança de operação, diagnóstico antes de
      conclusão. Nunca vende — ajuda a construir o caso com evidência, evitando
      "Pretensão de Valor" (afirmar sem provar) nas próprias decisões da Cadarn.
    status: ativo

  - id: consultora
    name: Camy
    role: Estratégia e Posicionamento Premium para Consultores de Marketing
    dna_source: "Camila Renaux"
    knowledge_path:
      - ".aiox-core/knowledge/agents-dna/renaux/"
    agent_file: "squads/cadarn-marketing/agents/consultora.md"
    command: ".claude/commands/conselho/consultora.md"
    note: "Duplo chapéu — também Consultora Sênior da Squad Cadarn Marketing"
    focus: |
      Orientar profissionais de marketing que querem se posicionar como estrategistas
      de alto valor: Supermercado do Estrategista, Sessão de Clareza como produto,
      precificação premium, venda relacional, modelo dos bastidores (sem exposição constante).
    status: ativo

config:
  extends: extend
  language: pt-BR

tags:
  - mentoria
  - cadarn
  - conselho
  - gestao
