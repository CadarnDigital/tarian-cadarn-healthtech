icp:
  primary: "Operadores de saúde suplementar — corretoras de plano de saúde, faturamento hospitalar/BPO e clínicas/consultórios pequenos"
  segments:
    - "Gestor operacional de corretora — dor: glosa, cadastro travado, venda perdida (Influenciador/usuário)"
    - "Responsável por faturamento hospitalar — dor: volume alto, custo de equipe, TISS (Influenciador/usuário)"
    - "Dono de clínica/consultório pequeno — dor: retrabalho, tempo da equipe (Decisor, mas lê 'saúde' como saúde do paciente, não como operação)"
    - "Decisor financeiro/sócio/diretor — dor: receita represada, custo de oportunidade (Decisor — precisa de argumento de crescimento, não só eficiência)"
  ticket_range: "Setup R$3.000,00 (única vez) + Mensalidade R$1.500,00/mês — confirmado para o 1º produto do Trio da Eficiência (automação de cadastro). Preço dos demais 2 produtos do Trio (faturamento, sinistralidade): [INFERÊNCIA — não verificada: não pesquisado ainda]"
  ciclo_venda: "~84 dias em média (dado HubSpot citado na fonte); por porte de corretora: 1-3 meses (pequenas) a 4-6+ meses (médias); 6-9 meses em soluções complexas de BPO integral a corretoras/administradoras"

